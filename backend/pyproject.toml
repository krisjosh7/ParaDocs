[tool.pytest.ini_options]
testpaths = ["tests", "rag/tests"]
markers = [
    "integration: full RAG path (HTTP + Chroma + disk); no Ollama",
    "ollama: requires Ollama on 127.0.0.1:11434; skipped if unreachable",
]

[tool.coverage.run]
source = ["."]
omit = [
    "*/venv/*",
    "*/tests/*",
    "*/rag/tests/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
]
